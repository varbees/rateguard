name: CI

# The repo had ~790 tests and no CI at all — every run was manual, which is
# how the SSE usage bug (e6eba43) stayed green and undetected. Tests nobody
# runs automatically are tests that pass until they matter.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache-dependency-path: packages/sdk-go/go.sum
      - run: go build ./...
      - run: go vet ./...
      # -race is the point of this job, not a bonus: budget enforcement is a
      # shared-counter problem, and shared counters are where races become money.
      - run: go test -race ./...

  node:
    name: Node
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-node
    steps:
      - uses: actions/checkout@v4
      # The repo uses bun (bun.lock is committed, and the release checklist has
      # always said `bun run test`). An earlier draft of this workflow used
      # `npm ci`, which requires a package-lock.json that does not exist — it
      # would have failed on its first run. npm is still used to PUBLISH, for
      # provenance; bun installs and builds.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bunx vitest run

  python:
    name: Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-python
    strategy:
      fail-fast: false
      matrix:
        # 3.10 is the floor declared in pyproject; test the floor, not just
        # whatever the dev box happens to run.
        python-version: ['3.10', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e '.[dev]'
      # tests/live needs real provider keys and is skipped by default; it is
      # excluded here explicitly so a missing key can never look like a pass.
      - run: python -m pytest -q --ignore=tests/live
      - run: mypy --strict rateguard

  zero-dependency:
    name: Zero-dependency import
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      # The README and __init__.py both claim `import rateguard` needs nothing
      # installed — the attestation/outbound/redis extras are lazily imported.
      # That claim was never tested. A bare venv is the only honest test of it.
      - name: Import with no dependencies at all
        working-directory: packages/sdk-python
        run: |
          python -m venv /tmp/bare
          /tmp/bare/bin/pip install --no-deps -e .
          /tmp/bare/bin/python -c "import rateguard; print('bare import OK:', rateguard.__version__)"

  parity:
    name: Cross-SDK parity (rule 3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache-dependency-path: packages/sdk-go/go.sum
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install Node deps
        working-directory: packages/sdk-node
        run: bun install --frozen-lockfile
      - name: Install Python SDK
        working-directory: packages/sdk-python
        run: pip install -e .
      # Names only. Behaviour parity is the conformance vectors' job — see the
      # conformance suites in each language job above.
      - name: Every manifest capability must resolve in all three SDKs
        run: python3 scripts/parity_guard.py

  mutation:
    name: Would the tests notice? (mutation score)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache-dependency-path: packages/sdk-go/go.sum
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install Node deps
        working-directory: packages/sdk-node
        run: bun install --frozen-lockfile
      - name: Install Python SDK
        working-directory: packages/sdk-python
        run: pip install -e '.[dev]'
      # Coverage measures whether a line RAN. This measures whether a test would
      # NOTICE the line being wrong — the only question that matters, and one
      # ~800 green tests answered "no" to three times this month.
      #
      # Every mutation reproduces a defect this repo actually shipped. A
      # survivor means we could ship that bug again today and stay green, so
      # anything below 100% fails: the catalogue is small and hand-picked, not
      # a generated spray where a survivor might be an equivalent mutant.
      - name: Every known defect must be detected
        run: python3 scripts/mutate.py --min-score 100

  supply-chain:
    name: Dependencies have no known vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache-dependency-path: packages/sdk-go/go.sum
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # Go: govulncheck traces ACTUAL CALLED CODE, not just the dep list — the
      # gold standard. It found (and we fixed) x/net and otel/sdk vulns, and it
      # is why CI pins go 1.25.x: the stdlib fixes ship in the toolchain patch.
      # A crypto library that ships known-vulnerable transitive deps has no
      # business asking anyone to trust its signatures.
      - name: Go — govulncheck (fails on called vulnerabilities)
        working-directory: packages/sdk-go
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      # Node: the gate is what SHIPS, and the published package has zero runtime
      # dependencies (files: ["dist"]). --prod audits exactly that surface and
      # must be clean. Dev-tooling advisories (vite/esbuild/vitest — all
      # Windows-dev-server issues that never ship and CI never runs) are
      # reported but do not fail the build: failing on a vuln that cannot reach
      # a user teaches everyone to ignore the gate.
      - name: Node — audit shipped deps (fails); report dev deps
        working-directory: packages/sdk-node
        run: |
          bun install --frozen-lockfile
          echo "::group::dev-dependency advisories (informational)"
          bun audit || true
          echo "::endgroup::"
          echo "shipped dependencies (must be clean):"
          bun audit --prod

      # Python: the runtime is stdlib-only (crypto/httpx/redis are optional
      # extras, lazily imported). pip-audit against a no-deps install is the
      # shipped surface.
      - name: Python — pip-audit the shipped install
        working-directory: packages/sdk-python
        run: |
          python -m pip install --quiet pip-audit
          python -m pip install --quiet --no-deps -e .
          pip-audit --progress-spinner off

  doc-samples:
    name: Docs tell the truth
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install Node deps
        working-directory: packages/sdk-node
        run: bun install --frozen-lockfile
      # The docs told users to write `tokenBudgetPerHour: 250_000`, which does
      # not exist: Python raised TypeError, and Node SILENTLY ignored it and
      # handed back the preset's 10,000. A spend-control product whose docs
      # misconfigure the spend control is the worst failure available to it, and
      # it shipped because nothing ever ran the samples.
      - name: Every Node and Python doc sample must typecheck against the real API
        run: python3 scripts/check_doc_samples.py

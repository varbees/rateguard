name: Release

# ── Why this exists ──
#
# Three releases were CUT and never PUBLISHED. v0.3.0 ("The Enforcement
# Release") and v0.4.0 exist as commits and nothing else; npm and PyPI have
# served 0.2.0 the entire time. v0.4.0's own commit message says it was cut to
# fix exactly that gap — and then it fell into it too.
#
# docs/RELEASE_CHECKLIST.md was not missing. It has the publish steps. But they
# are manual, interactive (`npm login`), credential-gated, and sit at the END of
# a long checklist: steps 1-5 verify and get done, steps 6-9 publish and get
# deferred. Three times. That is a design problem, not a discipline problem.
#
# So: pushing a tag publishes. "Cut" and "published" cannot diverge, because
# they are the same action.
#
#   git tag -a v0.5.0 -m "v0.5.0" && git push origin v0.5.0
#
# Go needs nothing here — the module proxy picks up `packages/sdk-go/vX.Y.Z`
# on push. Only npm and PyPI need a human, so only they are automated.
#
# ── One-time setup (Harsha) ──
#
#  npm  — create an automation token (npmjs.com → Access Tokens → Granular,
#         read+write on @varbees/rateguard-node) and add it as the repo secret
#         NPM_TOKEN.
#  PyPI — configure a Trusted Publisher (pypi.org → varbees-rateguard →
#         Publishing → Add a new publisher: GitHub, repo varbees/rateguard,
#         workflow release.yml, environment pypi). NO TOKEN NEEDED — OIDC.
#
# After that, releasing is one tag push, forever.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build and verify, but do not publish'
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  # Go modules resolve off a SUBMODULE tag (packages/sdk-go/vX.Y.Z), not the
  # repo-wide vX.Y.Z. That tag was pushed by hand — and forgotten for 0.5.0, so
  # the proxy stayed on 0.3.0 while npm and PyPI moved to 0.5.0. Automate it:
  # a repo-wide vX.Y.Z tag now mints the matching Go submodule tag, so the three
  # registries can never drift on version again.
  go-tag:
    name: Publish Go (mint the submodule tag)
    needs: verify
    if: startsWith(github.ref, 'refs/tags/') && !inputs.dry_run
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Tag packages/sdk-go/<version> at this commit
        env:
          TAG: ${{ github.ref_name }}
        run: |
          GOTAG="packages/sdk-go/${TAG}"
          if git ls-remote --tags origin "refs/tags/${GOTAG}" | grep -q .; then
            echo "::notice::${GOTAG} already exists — nothing to do"
            exit 0
          fi
          # An annotated tag needs a committer identity; the runner has none by
          # default (fatal: empty ident name). Set the actions bot identity.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$GOTAG" -m "$GOTAG" "${GITHUB_SHA}"
          git push origin "$GOTAG"
          echo "pushed $GOTAG — the Go proxy will serve it on first fetch"

  # Never publish something the suite has not passed. A release that skips
  # verification is how a silently-broken metering path reaches users.
  verify:
    name: Verify before publishing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache-dependency-path: packages/sdk-go/go.sum
      # The repo uses bun (bun.lock is committed, and the release checklist has
      # always said `bun run test`). An earlier draft of this workflow used
      # `npm ci`, which requires a package-lock.json that does not exist — it
      # would have failed on its first run. npm is still used to PUBLISH, for
      # provenance; bun installs and builds.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Go
        working-directory: packages/sdk-go
        run: go test -race ./...

      - name: Node
        working-directory: packages/sdk-node
        run: bun install --frozen-lockfile && bun run build && bunx vitest run

      - name: Python
        working-directory: packages/sdk-python
        run: pip install -e '.[dev]' && python -m pytest -q --ignore=tests/live && mypy --strict rateguard

      - name: Cross-SDK parity
        run: pip install -e packages/sdk-python && python3 scripts/parity_guard.py

      - name: Docs tell the truth
        run: python3 scripts/check_doc_samples.py

      # The tag must match what the packages actually claim, or users install a
      # version that does not exist in the changelog.
      - name: Tag matches package versions
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          NODE=$(python3 -c "import json;print(json.load(open('packages/sdk-node/package.json'))['version'])")
          PY=$(python3 -c "import tomllib;print(tomllib.load(open('packages/sdk-python/pyproject.toml','rb'))['project']['version'])")
          PYV=$(grep -oP '__version__ = "\K[^"]+' packages/sdk-python/rateguard/__init__.py)
          echo "tag=$TAG node=$NODE pyproject=$PY __version__=$PYV"
          for v in "$NODE" "$PY" "$PYV"; do
            if [ "$v" != "$TAG" ]; then
              echo "::error::version mismatch — tag says $TAG, package says $v"
              exit 1
            fi
          done

  npm:
    name: Publish to npm
    needs: verify
    if: startsWith(github.ref, 'refs/tags/') && !inputs.dry_run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # provenance
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - working-directory: packages/sdk-node
        run: bun install --frozen-lockfile && bun run build
      - name: Publish
        working-directory: packages/sdk-node
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  pypi:
    name: Publish to PyPI
    needs: verify
    if: startsWith(github.ref, 'refs/tags/') && !inputs.dry_run
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write # Trusted Publishing — no token stored anywhere
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Build
        working-directory: packages/sdk-python
        run: pip install build && python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/sdk-python/dist
          # PEP 740 attestations — Sigstore-signed, recorded in Rekor. Default
          # ON when id-token:write is present; made explicit because this is a
          # trust guarantee, not an incidental. The same keyless Fulcio+Rekor
          # model as npm --provenance and the cosign job below.
          attestations: true

  # "Cut" is not "published" — that assumption is what left two releases
  # stranded. Ask the registries, do not assume the upload worked.
  confirm:
    name: Confirm the registries actually serve it
    needs: [npm, pypi, go-tag]
    if: startsWith(github.ref, 'refs/tags/') && !inputs.dry_run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - name: Wait for propagation
        run: sleep 45
      - name: All three registries must serve the tagged version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          NPM=$(curl -sf "https://registry.npmjs.org/@varbees/rateguard-node" | python3 -c "import json,sys;print(json.load(sys.stdin)['dist-tags']['latest'])")
          PYPI=$(curl -sf "https://pypi.org/pypi/varbees-rateguard/json" | python3 -c "import json,sys;print(json.load(sys.stdin)['info']['version'])")
          echo "tag=$TAG npm=$NPM pypi=$PYPI"
          [ "$NPM" = "$TAG" ] || { echo "::error::npm serves $NPM, expected $TAG"; exit 1; }
          [ "$PYPI" = "$TAG" ] || { echo "::error::PyPI serves $PYPI, expected $TAG"; exit 1; }
          # Go: the proxy only lists a version once fetched, so fetch it — this
          # both populates the proxy and confirms it resolves. This is the check
          # that would have caught Go lagging at 0.3.0 while the others moved.
          GOPROXY=proxy.golang.org go list -m "github.com/varbees/rateguard/packages/sdk-go@${GITHUB_REF_NAME}" \
            || { echo "::error::Go proxy cannot resolve ${GITHUB_REF_NAME}"; exit 1; }
          echo "✓ all three registries serve $TAG"

  # ── Signed GitHub Release (Sigstore keyless) ──
  #
  # Runs LAST, only after both registries are confirmed serving the version, so
  # it can never endanger the actual package publish — a signing hiccup leaves
  # the packages published and just skips the GitHub Release, which is re-runnable.
  #
  # npm --provenance and PyPI attestations already cover the PACKAGES with the
  # same Fulcio+Rekor model, so cosign here does the non-redundant part: it signs
  # the artifacts the registries don't — a whole-repo SBOM and the release notes —
  # and attaches them with offline-verifiable bundles.
  #
  # This is also the project practicing what it preaches. RateGuard ships
  # cryptographic spend evidence and its own docs say honest evidence needs an
  # EXTERNAL key (not app-held) and an EXTERNAL witness (a transparency log).
  # Sigstore keyless IS that pattern: Fulcio issues a short-lived cert bound to
  # this workflow's OIDC identity (no stored key), and Rekor is the public
  # witness. An evidence product that signed its releases with a raw key in a
  # secret would be contradicting its own thesis.
  sign-release:
    name: Sign the GitHub Release (keyless)
    needs: [confirm]
    if: startsWith(github.ref, 'refs/tags/') && !inputs.dry_run
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the release, upload assets
      id-token: write   # keyless signing — ambient OIDC, no stored key
    steps:
      - uses: actions/checkout@v4
      - uses: sigstore/cosign-installer@v3
      - uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: rateguard-${{ github.ref_name }}-sbom.cyclonedx.json
      - name: Sign the SBOM (Sigstore keyless → Rekor)
        env:
          SBOM: rateguard-${{ github.ref_name }}-sbom.cyclonedx.json
        run: |
          cosign sign-blob --yes --bundle "${SBOM}.sigstore.json" "$SBOM"
          echo "signed $SBOM — bundle carries the cert, signature, and Rekor inclusion proof"
      - name: Create the signed GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          NOTES=$(awk "/^## \[${TAG#v}\]/{f=1;next} /^## \[/{f=0} f" CHANGELOG.md)
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "${NOTES:-See CHANGELOG.md}" \
            "rateguard-${TAG}-sbom.cyclonedx.json" \
            "rateguard-${TAG}-sbom.cyclonedx.json.sigstore.json"
          echo "::notice::verify with — cosign verify-blob --bundle rateguard-${TAG}-sbom.cyclonedx.json.sigstore.json \\"
          echo "  --certificate-identity-regexp 'https://github.com/varbees/rateguard/.github/workflows/release.yml@.*' \\"
          echo "  --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' rateguard-${TAG}-sbom.cyclonedx.json"

name: Bug report
description: Report a reproducible problem in RateGuard.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Share the smallest possible reproduction. Include command output, config, and expected behavior.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: How can we reproduce the issue?
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

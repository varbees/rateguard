name: Feature request
description: Suggest a product or runtime improvement for RateGuard.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Keep the request focused on user value and operational impact.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: What should RateGuard do?
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What pain does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would a good implementation look like?
    validations:
      required: true

name: rateguard

x-gateway-env: &gateway-env
  AGG_SERVER_HOST: ${AGG_SERVER_HOST:-0.0.0.0}
  AGG_SERVER_PORT: ${AGG_SERVER_PORT:-8008}
  AGG_SERVER_READ_TIMEOUT_SEC: ${AGG_SERVER_READ_TIMEOUT_SEC:-30}
  AGG_SERVER_WRITE_TIMEOUT_SEC: ${AGG_SERVER_WRITE_TIMEOUT_SEC:-30}
  AGG_SERVER_SHUTDOWN_TIMEOUT_SEC: ${AGG_SERVER_SHUTDOWN_TIMEOUT_SEC:-30}
  BASE_URL: ${BASE_URL:-http://localhost:8008}
  DB_HOST: ${DB_HOST:-postgres}
  DB_PORT: ${DB_PORT:-5432}
  DB_USER: ${DB_USER:-rateguard}
  DB_PASSWORD: ${DB_PASSWORD:-rateguard_dev_pass}
  DB_NAME: ${DB_NAME:-rateguard}
  DB_SSL_MODE: ${DB_SSL_MODE:-disable}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  REDIS_DB: ${REDIS_DB:-0}
  REDIS_POOL_SIZE: ${REDIS_POOL_SIZE:-10}
  REDIS_MIN_IDLE_CONNS: ${REDIS_MIN_IDLE_CONNS:-5}
  REDIS_MAX_RETRIES: ${REDIS_MAX_RETRIES:-3}
  REDIS_DIAL_TIMEOUT_SEC: ${REDIS_DIAL_TIMEOUT_SEC:-5}
  REDIS_READ_TIMEOUT_SEC: ${REDIS_READ_TIMEOUT_SEC:-3}
  REDIS_WRITE_TIMEOUT_SEC: ${REDIS_WRITE_TIMEOUT_SEC:-3}
  AGG_WORKER_POOL_WORKER_COUNT: ${AGG_WORKER_POOL_WORKER_COUNT:-20}
  AGG_WORKER_POOL_QUEUE_SIZE: ${AGG_WORKER_POOL_QUEUE_SIZE:-200}
  AGG_RATE_LIMITER_REQUESTS_PER_SECOND: ${AGG_RATE_LIMITER_REQUESTS_PER_SECOND:-100}
  AGG_RATE_LIMITER_BURST_SIZE: ${AGG_RATE_LIMITER_BURST_SIZE:-200}
  AGG_RATE_LIMITER_ENABLED: ${AGG_RATE_LIMITER_ENABLED:-true}
  AGG_LOGGING_LEVEL: ${AGG_LOGGING_LEVEL:-info}
  AGG_LOGGING_FORMAT: ${AGG_LOGGING_FORMAT:-console}
  AGG_LOGGING_DEVELOPMENT: ${AGG_LOGGING_DEVELOPMENT:-true}
  AGG_TIMEOUTS_API_REQUEST_SEC: ${AGG_TIMEOUTS_API_REQUEST_SEC:-10}
  AGG_TIMEOUTS_AGGREGATION_SEC: ${AGG_TIMEOUTS_AGGREGATION_SEC:-60}
  AGG_TIMEOUTS_HTTP_CLIENT_SEC: ${AGG_TIMEOUTS_HTTP_CLIENT_SEC:-30}
  AGG_TIMEOUTS_IDLE_CONN_SEC: ${AGG_TIMEOUTS_IDLE_CONN_SEC:-90}
  AGG_RATEGUARD_ENABLE_MULTI_LIMITER: ${AGG_RATEGUARD_ENABLE_MULTI_LIMITER:-true}
  AGG_RATEGUARD_CLEANUP_INTERVAL_MIN: ${AGG_RATEGUARD_CLEANUP_INTERVAL_MIN:-60}
  AGG_RATEGUARD_RATELIMIT_BACKEND: ${AGG_RATEGUARD_RATELIMIT_BACKEND:-redis}
  AGG_RATEGUARD_CIRCUIT_BREAKER_MAX_FAILURES: ${AGG_RATEGUARD_CIRCUIT_BREAKER_MAX_FAILURES:-5}
  AGG_RATEGUARD_CIRCUIT_BREAKER_TIMEOUT_SECONDS: ${AGG_RATEGUARD_CIRCUIT_BREAKER_TIMEOUT_SECONDS:-60}
  AGG_RATEGUARD_CIRCUIT_BREAKER_MAX_CONCURRENT_REQUESTS_HALF_OPEN: ${AGG_RATEGUARD_CIRCUIT_BREAKER_MAX_CONCURRENT_REQUESTS_HALF_OPEN:-1}
  AGG_RATEGUARD_CIRCUIT_BREAKER_SUCCESS_THRESHOLD_HALF_OPEN: ${AGG_RATEGUARD_CIRCUIT_BREAKER_SUCCESS_THRESHOLD_HALF_OPEN:-2}
  AGG_WEBHOOK_ENABLED: ${AGG_WEBHOOK_ENABLED:-true}
  AGG_WEBHOOK_WORKER_COUNT: ${AGG_WEBHOOK_WORKER_COUNT:-5}
  AGG_WEBHOOK_POLL_INTERVAL_SEC: ${AGG_WEBHOOK_POLL_INTERVAL_SEC:-5}
  AGG_WEBHOOK_DELIVERY_TIMEOUT_SEC: ${AGG_WEBHOOK_DELIVERY_TIMEOUT_SEC:-30}
  AGG_WEBHOOK_MAX_RETRIES: ${AGG_WEBHOOK_MAX_RETRIES:-5}
  AGG_WEBHOOK_BASE_RETRY_DELAY_SEC: ${AGG_WEBHOOK_BASE_RETRY_DELAY_SEC:-5}
  AGG_WEBHOOK_MAX_RETRY_DELAY_SEC: ${AGG_WEBHOOK_MAX_RETRY_DELAY_SEC:-300}
  AGG_WEBHOOK_RETENTION_DAYS: ${AGG_WEBHOOK_RETENTION_DAYS:-30}
  OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-rateguard-control-plane}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-otel-collector:4317}
  JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
  # Default dev key must be a valid base64-encoded 32-byte AES-256 key.
  ENCRYPTION_KEY: ${ENCRYPTION_KEY:-XCIzDyguG121pB5B8Cs5ublmkp4V10hXbA1w+qvKsGE=}
  RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
  RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
  RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
  STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
  STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}

services:
  postgres:
    image: postgres:16-alpine
    container_name: rateguard-postgres
    hostname: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rateguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rateguard_dev_pass}
      POSTGRES_DB: ${POSTGRES_DB:-rateguard}
      POSTGRES_INITDB_ARGS: "-E UTF8"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rateguard} -d ${POSTGRES_DB:-rateguard}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rateguard-redis
    hostname: redis
    ports:
      - "${REDIS_PORT_HOST:-6379}:6379"
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - "900"
      - "1"
      - --save
      - "300"
      - "10"
      - --save
      - "60"
      - "10000"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.121.0
    container_name: rateguard-otel
    hostname: otel-collector
    command: [ "--config=/etc/otelcol-contrib/config.yaml" ]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    restart: unless-stopped

  gateway:
    build:
      context: ../..
      dockerfile: apps/gateway/Dockerfile
    image: rateguard/gateway:local
    container_name: rateguard-gateway
    hostname: gateway
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    ports:
      - "8008:8008"
    environment: *gateway-env
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8008/health" ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: rateguard-prometheus
    hostname: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../../apps/gateway/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.1
    container_name: rateguard-grafana
    hostname: grafana
    ports:
      - "${GRAFANA_PORT:-3300}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ../../apps/gateway/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../apps/gateway/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:

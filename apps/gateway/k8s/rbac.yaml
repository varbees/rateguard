apiVersion: v1
kind: ServiceAccount
metadata:
  name: rateguard
  namespace: default
  labels:
    app: rateguard
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rateguard
  namespace: default
  labels:
    app: rateguard
rules:
  # Allow reading ConfigMaps (for configuration)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]

  # Allow reading Secrets (for credentials)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]

  # Allow reading Pods (for pod information)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rateguard
  namespace: default
  labels:
    app: rateguard
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rateguard
subjects:
  - kind: ServiceAccount
    name: rateguard
    namespace: default

apiVersion: v1
kind: Secret
metadata:
  name: rateguard-secrets
  namespace: default
  labels:
    app: rateguard
type: Opaque
stringData:
  # Database Credentials (REQUIRED - Change these!)
  db.user: "rateguard"
  db.password: "CHANGE_ME_PRODUCTION_PASSWORD"

  # Redis Credentials (optional if no auth)
  redis.password: ""

  # JWT Secret (REQUIRED - Generate with: openssl rand -hex 32)
  jwt.secret: "CHANGE_ME_GENERATE_WITH_openssl_rand_hex_32"

  # Encryption Key (REQUIRED - Generate with: openssl rand -base64 32)
  encryption.key: "CHANGE_ME_GENERATE_WITH_openssl_rand_base64_32"

  # Razorpay Credentials (optional if not using Razorpay)
  razorpay.key_id: ""
  razorpay.key_secret: ""
  razorpay.webhook_secret: ""

  # Stripe Credentials (optional if not using Stripe)
  stripe.secret_key: ""
  stripe.publishable_key: ""
  stripe.webhook_secret: ""

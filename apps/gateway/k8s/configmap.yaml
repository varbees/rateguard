apiVersion: v1
kind: ConfigMap
metadata:
  name: rateguard-config
  namespace: default
  labels:
    app: rateguard
data:
  # Database Configuration
  db.host: "postgres.default.svc.cluster.local"
  db.port: "5432"
  db.name: "rateguard"
  db.ssl_mode: "require"

  # Redis Configuration
  redis.host: "redis.default.svc.cluster.local"
  redis.port: "6379"
  redis.db: "0"

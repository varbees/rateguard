server:
  host: "0.0.0.0"
  port: 8008
  read_timeout_sec: 30
  write_timeout_sec: 30
  shutdown_timeout_sec: 30

worker_pool:
  worker_count: 20
  queue_size: 200

rate_limiter:
  requests_per_second: 100
  burst_size: 200
  enabled: true

logging:
  level: "info" # debug, info, warn, error
  format: "console" # json, console
  development: false

timeouts:
  api_request_sec: 10 # Individual API request timeout
  aggregation_sec: 60 # Total aggregation timeout (increased for multiple APIs)
  http_client_sec: 30 # HTTP client global timeout
  idle_conn_sec: 90 # Keep-alive for idle connections

rateguard:
  enable_multi_limiter: true
  cleanup_interval_min: 60
  ratelimit_backend: "redis" # "redis" for distributed, "memory" for local dev

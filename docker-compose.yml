# One-command self-hosted RateGuard control center demo:
#   docker compose up
# Then open http://localhost:3001 — it's pre-pointed at the Go demo server
# below, which is already generating synthetic traffic so the dashboard
# has real, moving numbers on first load. docker compose down to stop.
#
# For a real deployment, swap the rateguard-demo service for your own
# service (call rg.AdminHandler() / rg.Metrics() from your own Go/Node/
# Python app) and point the dashboard's "Instance" field at it — the
# dashboard is a static client, it has no idea which RateGuard instance
# it's talking to until you tell it.
#
# To verify the SAME dashboard against a Node or Python backend instead of
# Go (they expose the identical admin API), bring either up as its own
# opt-in profile — the default `docker compose up` never starts them:
#   docker compose --profile node-demo up      # http://localhost:8081, key=demo:demo:demo:demo:demo
#   docker compose --profile python-demo up    # http://localhost:8082, key=demo:demo:demo:demo:demo
# Then point the dashboard's Instance field (Settings) at whichever port
# you brought up — the dashboard container itself doesn't need rebuilding
# per backend, it's the same static client either way.
#
# To also front a real third-party tool (Claude Code, Hermes, Aider — anything
# with a base_url override) instead of a service you own, bring up the connect
# proxy too — it's opt-in via a profile since it needs a real upstream:
#   UPSTREAM_BASE_URL=https://api.deepseek.com docker compose --profile connect up
# Then point the tool's base_url at http://localhost:8090/v1, and the
# dashboard's Instance field at http://localhost:8090 (key defaults to the
# upstream's host, e.g. "deepseek" — set CONNECT_NAME to override).
services:
  rateguard-demo:
    build:
      context: ./packages/sdk-go
      dockerfile: examples/dashboard-demo/Dockerfile
    ports:
      # Bound to the host's loopback only — the admin API this exposes has
      # no authentication of its own (see AdminHandler's doc comment), so
      # the default "8080:8080" form (which Docker maps to all host
      # interfaces) would let anyone on your LAN reach and rewrite policy.
      # Inter-container traffic (dashboard -> rateguard-demo) uses the
      # compose network directly and is unaffected by this host binding.
      - "127.0.0.1:8080:8080"

  rateguard-demo-node:
    profiles: ["node-demo"]
    build:
      context: ./packages/sdk-node
      dockerfile: examples/dashboard-demo/Dockerfile
    ports:
      - "127.0.0.1:8081:8081"

  rateguard-demo-python:
    profiles: ["python-demo"]
    build:
      context: ./packages/sdk-python
      dockerfile: examples/dashboard-demo/Dockerfile
    ports:
      - "127.0.0.1:8082:8082"

  dashboard:
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      - rateguard-demo

  connect:
    profiles: ["connect"]
    build:
      context: ./packages
      dockerfile: connect/Dockerfile
    ports:
      - "127.0.0.1:8090:8090"
    environment:
      # Falls back to a harmless default so plain `docker compose up` (no
      # --profile connect) never fails at parse time — compose interpolates
      # every service's env block up front, before filtering by profile.
      UPSTREAM_BASE_URL: ${UPSTREAM_BASE_URL:-https://api.openai.com}
      PORT: "8090"
      NAME: ${CONNECT_NAME:-}

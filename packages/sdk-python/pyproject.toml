[build-system]
requires = []
build-backend = "build_backend"
backend-path = ["."]

[project]
name = "varbees-rateguard"
version = "0.3.0"
description = "Python middleware SDK for RateGuard"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = []

[project.urls]
Homepage = "https://github.com/varbees/rateguard/tree/main/packages/sdk-python"
Repository = "https://github.com/varbees/rateguard"
Issues = "https://github.com/varbees/rateguard/issues"

[project.optional-dependencies]
fastapi = ["fastapi>=0.100.0", "starlette>=0.27.0"]
flask = ["flask>=2.0.0"]
django = ["django>=4.0"]
# Outbound LLM tracking (wrap_httpx_client/wrap_httpx_async_client,
# create_httpx_transport) lazily imports httpx — README-documented public
# API, not a test-only concern, so it gets its own extra rather than only
# living in "dev".
outbound = ["httpx>=0.24.0"]
# Distributed rate limiting (RedisGCRALimiter, RedisPyClient/AsyncRedisPyClient)
# lazily imports redis — same reasoning as "outbound".
redis = ["redis>=5.0.0"]
attestation = ["cryptography>=41.0.0"]
dev = ["pytest", "pytest-asyncio", "httpx", "anyio", "mypy", "openai", "anthropic", "redis"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.mypy]
python_version = "3.10"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_any_generics = true
no_implicit_optional = true
show_error_codes = true
